name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel a production deploy mid-flight

jobs:
  # Wait for CI to pass on the same SHA before deploying
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: 'Build Web'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

  # ── Deploy to Vercel (production) ─────────────────────────────────────────
  deploy-vercel:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [wait-for-ci]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

  # ── Smoke test production ─────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-vercel]
    steps:
      - name: Health check
        run: |
          URL="${{ secrets.PRODUCTION_URL }}/health"
          echo "Checking $URL"
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "$URL"; then
              echo "Smoke test passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1

  # ── Preview deployments (on PRs) ──────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview to Vercel
        id: preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
