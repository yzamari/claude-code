name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production CLI bundle
        run: bun run build:prod

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build production web bundle
        run: bun run build:web:prod

      - name: Create release archive
        run: |
          mkdir -p release-assets
          cp dist/cli.mjs release-assets/claude-cli.mjs
          tar -czf release-assets/docker-compose.tar.gz \
            docker/docker-compose.yml \
            docker/docker-compose.prod.yml \
            docker/entrypoint.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: |
            release-assets/claude-cli.mjs
            release-assets/docker-compose.tar.gz
            docker/docker-compose.yml
