# Nginx reverse proxy for Claude Web Terminal
#
# Handles:
#   - TLS termination (configure your cert paths)
#   - WebSocket proxying (required for the PTY terminal — /ws)
#   - SSE streaming (proxy_buffering off)
#   - Gzip compression
#
# Usage:
#   1. Copy this file to /etc/nginx/sites-available/claude-web
#   2. Update `server_name` and `ssl_certificate` paths
#   3. ln -s /etc/nginx/sites-available/claude-web /etc/nginx/sites-enabled/
#   4. nginx -t && nginx -s reload
# ─────────────────────────────────────────────────────────────

upstream claude_web {
    server localhost:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name claude.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name claude.example.com;

    # ── TLS ─────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/claude.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claude.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Security headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    # ── WebSocket proxy (/ws) ─────────────────────────────────
    # The PTY terminal connects here for real-time I/O.
    location /ws {
        proxy_pass http://claude_web;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep the WebSocket connection alive
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for WebSocket
        proxy_buffering off;
    }

    # ── General HTTP proxy ────────────────────────────────────
    location / {
        proxy_pass http://claude_web;
        proxy_http_version 1.1;

        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE (server-sent events) — do NOT buffer
        proxy_buffering off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Health check endpoint (no auth required) ──────────────
    location /health {
        proxy_pass http://claude_web;
        access_log off;
    }
}
