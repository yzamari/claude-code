{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-code.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ required "secrets.anthropicApiKey is required" .Values.secrets.anthropicApiKey | quote }}
  {{- if .Values.secrets.authToken }}
  AUTH_TOKEN: {{ .Values.secrets.authToken | quote }}
  {{- end }}
  SESSION_SECRET: {{ default (randAlphaNum 64) .Values.secrets.sessionSecret | quote }}
{{- end }}
