<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code — Sign In</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #238636;
      --green-hover: #2ea043;
      --green-border: #2ea043;
      --red: #f85149;
      --code-bg: #21262d;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fa;
        --surface: #ffffff;
        --border: #d0d7de;
        --text: #1f2328;
        --muted: #656d76;
        --accent: #0969da;
        --green: #1a7f37;
        --green-hover: #2da44e;
        --green-border: #2da44e;
        --red: #d1242f;
        --code-bg: #eaeef2;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .logo img { width: 32px; height: 32px; }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .error-box {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.4);
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      color: var(--red);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    <!--ERROR-->

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--muted);
    }

    input[type="password"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.6rem 1rem;
      background: var(--green);
      border: 1px solid var(--green-border);
      border-radius: 6px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: var(--green-hover); }
    button[type="submit"]:active { filter: brightness(0.9); }

    .hint {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 1rem;
      line-height: 1.5;
    }

    .hint a { color: var(--accent); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    code {
      background: var(--code-bg);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="favicon.svg" alt="">
      <h1>Claude Code</h1>
    </div>
    <p class="subtitle">Enter your Anthropic API key to start a terminal session.</p>

    <!--ERROR-->

    <form method="POST" action="/auth/login" autocomplete="off">
      <label for="api_key">Anthropic API Key</label>
      <input
        type="password"
        id="api_key"
        name="api_key"
        placeholder="sk-ant-api03-..."
        spellcheck="false"
        required
        autofocus
      >
      <button type="submit">Sign In</button>
    </form>

    <p class="hint">
      Your key is encrypted on the server and never exposed to the browser after submission.
      Sessions are isolated per key — no one else can see your terminal.
      Get a key at <a href="https://console.anthropic.com" target="_blank" rel="noopener noreferrer">console.anthropic.com</a>.
    </p>
  </div>
</body>
</html>
